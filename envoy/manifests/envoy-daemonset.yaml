apiVersion: v1
kind: ServiceAccount
metadata:
  name: envoy-proxy
  namespace: envoy-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: envoy-proxy
  namespace: envoy-system
spec:
  selector:
    matchLabels:
      app: envoy-proxy
  template:
    metadata:
      labels:
        app: envoy-proxy
    spec:
      serviceAccountName: envoy-proxy
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: envoy
        image: envoyproxy/envoy:v1.32.2
        args:
        - -c
        - /etc/envoy/envoy.yaml
        - --log-level
        - info
        - --disable-hot-restart
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
        ports:
        - containerPort: 15006
          hostPort: 15006
          name: inbound
        - containerPort: 15001
          hostPort: 15001
          name: outbound
        volumeMounts:
        - name: envoy-config
          mountPath: /etc/envoy
          readOnly: true
        - name: spire-agent-socket
          mountPath: /run/spire/agent-sockets
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      - name: envoy-config
        configMap:
          name: envoy-config
      - name: spire-agent-socket
        hostPath:
          path: /run/spire/agent-sockets
          type: DirectoryOrCreate
      tolerations:
      - operator: Exists
